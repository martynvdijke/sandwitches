{{ define "header" }}
<!DOCTYPE html>
<html lang="{{ or .user.Language "en" }}">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>{{ block "title" . }}Sandwitches{{ end }}</title>
    <link href="/static/dist/main.css" rel="stylesheet">
    <script src="/static/dist/main.js" defer></script>
    <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main.container { flex: 1; padding-bottom: 80px; padding-top: 2rem; }
        @media only screen and (min-width: 992px) { main.container { padding-left: 10%; padding-right: 10%; } }
        .loading-sandwich-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255,255,255,0.8); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
            visibility: hidden; opacity: 0; transition: visibility 0s, opacity 0.3s linear;
        }
        .loading-sandwich-container.show { visibility: visible; opacity: 1; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    {{ block "extra_head" . }}{{ end }}
</head>
<body class="{{ if .user }}{{ .user.Theme }}{{ end }}">
<div id="loading-sandwich" class="loading-sandwich-container">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1.5s linear infinite;">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><path d="M12 9v6"/><path d="M10 12h4"/>
    </svg>
</div>

{{ if .error }}
<div class="padding no-margin">
    <div class="snackbar active error">
        <i>error</i><span>{{ .error }}</span>
    </div>
</div>
{{ end }}
<main class="container" role="main">
{{ end }}
