{{ define "navbar" }}
<nav class="top primary-container">
    <button class="circle transparent large" onclick="ui('#menu')">
        <i>menu</i>
    </button>
    <a href="/" class="row align-center">
        <img src="/static/icons/icon.svg" class="circle small">
    </a>
    <div class="max"></div>
    {{ if .user }}
    <a href="/cart" class="button circle transparent">
        <i>shopping_cart</i>
    </a>
    <button class="circle transparent" onclick="ui('#user-menu')">
        {{ if .user.Avatar }}
        <img src="{{ .user.Avatar }}" class="circle">
        {{ else }}
        <div class="chip circle large primary-container">{{ first .user.Username }}</div>
        {{ end }}
    </button>
    {{ else }}
    <a href="/login"><button class="chip transparent border">Login</button></a>
    <a href="/signup"><button class="chip primary">Sign up</button></a>
    {{ end }}
</nav>
{{ end }}
