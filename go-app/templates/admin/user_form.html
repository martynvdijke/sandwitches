{{ template "head" . }}{{ template "navbar" . }}<div class="space"></div><h4>Edit User</h4><form method="post"><div class="field label border round"><input type="text" name="username" value="{{ .user_obj.Username }}" required><label>Username</label></div><div class="field label border round"><input type="email" name="email" value="{{ .user_obj.Email }}"><label>Email</label></div><div class="field label border round"><input type="text" name="first_name" value="{{ .user_obj.FirstName }}"><label>First name</label></div><div class="field label border round"><input type="text" name="last_name" value="{{ .user_obj.LastName }}"><label>Last name</label></div><div class="field textarea label border round"><textarea name="bio">{{ .user_obj.Bio }}</textarea><label>Bio</label></div><div class="field middle-align"><label><input type="checkbox" name="is_staff" {{ if .user_obj.IsStaff }}checked{{ end }}> Staff</label></div><div class="field middle-align"><label><input type="checkbox" name="is_active" {{ if .user_obj.IsActive }}checked{{ end }}> Active</label></div><div class="space"></div><button type="submit" class="button primary round">Save</button></form>{{ template "tail" . }}
