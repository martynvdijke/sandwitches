{{ template "admin_head" . }}{{ template "admin_nav" . }}<main class="responsive"><div class="large-space"></div><article class="round padding surface-container"><h4>Site Settings</h4><div class="space"></div><form method="post"><div class="grid"><div class="s12 m6"><div class="field label border round"><input type="text" name="site_name" value="{{ .setting.SiteName }}"><label>Site Name</label></div></div><div class="s12 m6"><div class="field label border round"><input type="email" name="email" value="{{ .setting.Email }}"><label>Site Email</label></div></div><div class="s12"><div class="field textarea label border round"><textarea name="site_description">{{ .setting.SiteDescription }}</textarea><label>Site Description</label></div></div><div class="s12 m6"><div class="field label border round"><select name="log_level">{{ range .log_level_choices }}<option value="{{ . }}" {{ if eq $.setting.LogLevel . }}selected{{ end }}>{{ . }}</option>{{ end }}</select><label>Log Level</label></div></div><div class="s12 m6"><div class="field label border round"><input type="text" name="gotify_url" value="{{ .setting.GotifyURL }}"><label>Gotify URL</label></div></div><div class="s12 m6"><div class="field label border round"><input type="text" name="gotify_token" value="{{ .setting.GotifyToken }}"><label>Gotify Token</label></div></div><div class="s12 m6"><div class="field label border round"><input type="text" name="otel_endpoint" value="{{ .setting.OTelEndpoint }}"><label>OTel Endpoint</label></div></div><div class="s12 m6"><div class="field check round"><input type="checkbox" name="otel_enabled"{{ if .setting.OTelEnabled }} checked{{ end }}><label>Enable OpenTelemetry</label></div></div></div><div class="space"></div><nav class="right-align"><button type="submit" class="button primary round"><i>save</i> Save Settings</button></nav></form></article></main>{{ template "admin_tail" . }}
