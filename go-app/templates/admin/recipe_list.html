{{ template "head" . }}{{ template "navbar" . }}<div class="space"></div><h4>Recipes</h4><a href="/dashboard/recipes/add" class="button primary round">Add Recipe</a><table class="border striped"><thead><tr><th>Title</th><th>Price</th><th>Created</th><th>Actions</th></tr></thead><tbody>{{ range .recipes }}<tr><td><a href="/recipes/{{ .Slug }}">{{ .Title }}</a></td><td>{{ if .Price }}{{ printf "%.2f" .Price }} &euro;{{ end }}</td><td>{{ .CreatedAt.Format "02/01/2006" }}</td><td><a href="/dashboard/recipes/{{ .ID }}/edit">Edit</a> <a href="/dashboard/recipes/{{ .ID }}/delete">Delete</a></td></tr>{{ end }}</tbody></table>{{ template "tail" . }}
