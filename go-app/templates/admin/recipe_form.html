{{ template "head" . }}{{ template "navbar" . }}<div class="space"></div><h4>{{ .title }}</h4><form method="post"><div class="field label border round"><input type="text" name="title" value="{{ .recipe.Title }}" required><label>Title</label></div><div class="field textarea label border round"><textarea name="description">{{ .recipe.Description }}</textarea><label>Description</label></div><div class="field textarea label border round"><textarea name="ingredients">{{ .recipe.Ingredients }}</textarea><label>Ingredients</label></div><div class="field textarea label border round"><textarea name="instructions">{{ .recipe.Instructions }}</textarea><label>Instructions</label></div><div class="grid"><div class="s12 m6"><div class="field label border round"><input type="number" name="servings" value="{{ .recipe.Servings }}" min="1"><label>Servings</label></div></div><div class="s12 m6"><div class="field label border round"><input type="number" name="price" step="0.01" value="{{ printf "%.2f" .recipe.Price }}"><label>Price</label></div></div></div><div class="field middle-align"><label><input type="checkbox" name="is_highlighted" {{ if .recipe.IsHighlighted }}checked{{ end }}> Highlighted</label></div><div class="field middle-align"><label><input type="checkbox" name="is_approved" {{ if .recipe.IsApproved }}checked{{ end }}> Approved</label></div><div class="space"></div><button type="submit" class="button primary round">Save</button></form>{{ template "tail" . }}
