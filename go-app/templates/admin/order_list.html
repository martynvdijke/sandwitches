{{ template "head" . }}{{ template "navbar" . }}<div class="space"></div><h4>Orders</h4><table class="border striped"><thead><tr><th>ID</th><th>User</th><th>Status</th><th>Total</th><th>Date</th><th>Update Status</th></tr></thead><tbody>{{ range .orders }}<tr><td>{{ .ID }}</td><td>{{ .User.Username }}</td><td><span class="chip">{{ .Status }}</span></td><td>{{ printf "%.2f" .TotalPrice }} &euro;</td><td>{{ .CreatedAt.Format "02/01/2006" }}</td><td><form method="post" action="/dashboard/orders/{{ .ID }}/status"><select name="status" onchange="this.form.submit()">{{ range $.status_choices }}<option value="{{ .Code }}">{{ .Label }}</option>{{ end }}</select></form></td></tr>{{ end }}</tbody></table>{{ template "tail" . }}
