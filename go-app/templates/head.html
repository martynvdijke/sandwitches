{{ define "head" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sandwitches</title>
    <link href="/static/dist/main.css" rel="stylesheet">
    <script src="/static/dist/main.js" defer></script>
    <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        main.container { flex: 1; padding-bottom: 80px; padding-top: 2rem; }
        @media only screen and (min-width: 992px) { main.container { padding-left: 10%; padding-right: 10%; } }
        .snackbar { margin-bottom: 0.5rem; }
        .flash-messages { position: fixed; top: 16px; right: 16px; z-index: 10000; max-width: 400px; }
        .flash-messages .snackbar { margin-bottom: 8px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .pagination { display: flex; justify-content: center; gap: 4px; padding: 1rem 0; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 6px 12px; border-radius: 8px; text-decoration: none; }
        .pagination .active { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    </style>
</head>
<body class="{{ if .user }}{{ .user.Theme }}{{ else }}light{{ end }}">
<div id="loading-wrap" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);display:none;justify-content:center;align-items:center;z-index:9999" id="loader">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1.5s linear infinite"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><path d="M12 9v6"/><path d="M10 12h4"/></svg>
</div>
<style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>

{{ if .flashes }}
<div class="flash-messages" id="flash-messages">
{{ range .flashes }}
<div class="snackbar active {{ if eq .Type "error" }}error{{ else }}primary{{ end }}">
    <i>{{ if eq .Type "error" }}error{{ else }}info{{ end }}</i>
    <span>{{ .Message }}</span>
</div>
{{ end }}
</div>
<script>
setTimeout(function(){
    var c=document.getElementById('flash-messages');
    if(c)c.style.display='none';
},5000);
</script>
{{ end }}

{{ if .error }}
<div class="padding no-margin"><div class="snackbar active error"><i>error</i><span>{{ .error }}</span></div></div>
{{ end }}
<main class="container" role="main">
{{ end }}
