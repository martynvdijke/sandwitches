name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pytest

  test-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go mod download
      - run: go vet ./...
      - run: go test -v ./...
