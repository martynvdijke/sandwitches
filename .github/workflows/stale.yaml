name: Stale branch and PR management

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6:00 UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale PRs and close
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # PR settings
          stale-pr-message: >
            This pull request has been inactive for 30 days.
            It will be closed automatically in 7 days if no further activity occurs.
          close-pr-message: >
            This pull request has been closed due to inactivity.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          
          # Issue settings (off by default)
          days-before-issue-stale: -1
          days-before-issue-close: -1
          
          # Exclude branches with these labels
          exempt-pr-labels: blocked, security, dependencies, keep

      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branches = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const protectedPrefixes = ['main', 'master', 'develop', 'release/', 'dependabot/'];
            const now = new Date();
            const staleDays = 60;
            const staleDate = new Date(now.getTime() - staleDays * 24 * 60 * 60 * 1000);

            for (const branch of branches.data) {
              const name = branch.name;
              
              // Skip protected branches
              if (protectedPrefixes.some(p => name.startsWith(p))) {
                continue;
              }

              // Only process branches whose PRs are closed/merged
              const pulls = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${name}`,
                state: 'closed',
                per_page: 1,
              });

              if (pulls.data.length > 0) {
                const pr = pulls.data[0];
                const updatedAt = new Date(pr.updated_at);
                
                if (updatedAt < staleDate) {
                  console.log(`Deleting stale branch: ${name} (last PR update: ${pr.updated_at})`);
                  try {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/${name}`,
                    });
                    console.log(`  ✓ Deleted`);
                  } catch (err) {
                    console.log(`  ✗ Failed to delete: ${err.message}`);
                  }
                }
              }
            }
